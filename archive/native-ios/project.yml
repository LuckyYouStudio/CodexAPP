# XcodeGen spec — run `xcodegen generate` (on a Mac) to produce CodexApp.xcodeproj.
name: CodexApp
options:
  bundleIdPrefix: com.codexapp
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  CodexApp:
    type: application
    platform: iOS
    sources:
      - CodexApp
    info:
      path: CodexApp/Info.plist
      properties:
        CFBundleDisplayName: CodexApp
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allow ws:// to the relay on the LAN. For remote use prefer wss:// (Tailscale).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "连接局域网内运行 Codex 中继的电脑"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codexapp.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
